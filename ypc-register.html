<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Enrollment | YPC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0a192f; --gold: #c5a059; --slate: #111; --white: #f8f9fa; }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--blue); color: white; }

        .registration-sidebar { width: 350px; background: rgba(0,0,0,0.5); height: 100vh; position: fixed; padding: 60px 40px; box-sizing: border-box; border-right: 1px solid var(--gold); }
        .registration-sidebar h2 { font-family: 'Cinzel'; color: var(--gold); }
        .step-list { list-style: none; padding: 0; margin-top: 40px; }
        .step-list li { margin-bottom: 25px; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .step-list li.active { color: var(--gold); font-weight: bold; }

        .main-form-area { margin-left: 350px; width: 100%; padding: 80px 10%; box-sizing: border-box; }
        .form-section { background: rgba(255,255,255,0.05); padding: 40px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        
        h3 { font-family: 'Cinzel'; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 30px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #aaa; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: white; border-radius: 0; }
        input:focus { border-color: var(--gold); outline: none; }

        .btn-submit { background: var(--gold); color: black; border: none; padding: 20px 40px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .text-logo { position: fixed; top: 20px; right: 40px; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="text-logo">YOUNG POLITICIANS COLLECTIVE // ENROLLMENT v2.6</div>

    <aside class="registration-sidebar">
        <h2>Enrollment</h2>
        <ul class="step-list">
            <li class="active">01. Guardian Identity</li>
            <li>02. Youth Ambition</li>
            <li>03. Ethics Agreement</li>
            <li>04. Credential Issue</li>
        </ul>
        <p style="font-size: 0.7rem; color: #555; margin-top: 100px;">ALL DATA IS ENCRYPTED VIA SOVEREIGN PROTOCOL.</p>
    </aside>

    <main class="main-form-area">
        <div class="form-section">
            <h3>1. Guardian Information</h3>
            <div class="input-row">
                <div><label>Full Legal Name</label><input type="text" placeholder="John Doe"></div>
                <div><label>Registry ID (If Member)</label><input type="text" placeholder="TBB-0000-00"></div>
            </div>
            <div class="input-row">
                <div><label>Primary Email</label><input type="email"></div>
                <div><label>Contact Number</label><input type="tel"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>2. Youth Candidate Profile</h3>
            <div class="input-row">
                <div><label>Candidate Name</label><input type="text"></div>
                <div><label>Age Group</label>
                    <select>
                        <option>Age 7-12 (Junior Delegate)</option>
                        <option>Age 13-17 (Senior Architect)</option>
                    </select>
                </div>
            </div>
            <div>
                <label>Primary Ambition Path (Selected in Quiz)</label>
                <select>
                    <option>The Gavel (Legislative)</option>
                    <option>The Shield (Judicial)</option>
                    <option>The Pen (Diplomatic)</option>
                    <option>The Forge (Economic)</option>
                </select>
            </div>
        </div>

        <button class="btn-submit">INITIALIZE MEMBERSHIP & ISSUE ID</button>
    </main>

</body>
</html>
