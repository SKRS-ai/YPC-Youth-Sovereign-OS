<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Interrupted | YPC 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #0a192f; 
            --gold: #c5a059; 
            --slate: #050505; 
            --white: #ffffff;
        }

        body { 
            margin: 0; padding: 0; background: var(--slate); 
            color: var(--white); font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            overflow: hidden;
        }

        /* Glitch Animation for the 404 Header */
        .glitch-wrapper { position: relative; }
        .error-code { 
            font-family: 'Cinzel'; font-size: 8rem; font-weight: 700; 
            color: var(--gold); margin: 0; line-height: 1; 
            position: relative;
        }
        
        .protocol-header { 
            font-family: 'Cinzel'; letter-spacing: 5px; 
            color: var(--white); text-transform: uppercase; 
            font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8;
        }

        .message { 
            max-width: 500px; color: #8892b0; font-size: 1rem; 
            line-height: 1.6; margin: 20px 0 40px 0;
        }

        /* Sovereign UI Elements */
        .scanline {
            width: 100%; height: 2px; background: rgba(197, 160, 89, 0.1);
            position: absolute; top: 0; left: 0; z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .btn-return { 
            padding: 15px 40px; border: 1px solid var(--gold); 
            color: var(--gold); text-decoration: none; font-family: 'Cinzel'; 
            font-weight: bold; font-size: 0.8rem; letter-spacing: 2px;
            transition: 0.4s; background: transparent;
        }

        .btn-return:hover { 
            background: var(--gold); color: var(--blue); 
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        .text-logo { 
            position: absolute; bottom: 40px; font-family: 'Cinzel'; 
            font-size: 0.7rem; color: var(--gold); opacity: 0.5; 
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="glitch-wrapper">
        <span class="protocol-header">Protocol Error: 404</span>
        <h1 class="error-code">VOID</h1>
    </div>

    <div class="message">
        The coordinate you requested does not exist within the <strong>Sovereign Registry</strong>. You may have attempted to access an unassigned node or an expired legislative draft.
    </div>

    <a href="index.html" class="btn-return">RETURN TO SECURE HUB</a>

    <div class="text-logo">THIN BLACK AND BROWN LINES USA // SYSTEM STATUS: ACTIVE</div>

</body>
</html>
