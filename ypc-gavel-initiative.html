<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Gavel Initiative | YPC Policy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0a192f; --gold: #c5a059; --paper: #fdfdfd; }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: #f0f0f0; }

        /* Sidebar Navigation */
        .sidebar { width: 280px; background: var(--blue); height: 100vh; position: fixed; color: white; padding: 40px 20px; box-sizing: border-box; }
        .sidebar a { display: block; color: rgba(255,255,255,0.7); text-decoration: none; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
        
        /* Main Content */
        .main-content { margin-left: 280px; width: 100%; min-height: 100vh; }
        .header-top { display: flex; justify-content: flex-end; padding: 20px 5%; background: white; border-bottom: 1px solid #ddd; }
        .text-logo { font-family: 'Cinzel'; font-weight: 700; font-size: 0.8rem; color: var(--blue); letter-spacing: 2px; }

        /* Policy Drafting Sheet */
        .drafting-area { max-width: 800px; margin: 60px auto; background: var(--paper); padding: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--gold); }
        .form-label { font-family: 'Cinzel'; font-size: 0.7rem; color: #888; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .policy-input { width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 15px 0; font-family: 'Cinzel'; font-size: 1.5rem; margin-bottom: 40px; outline: none; }
        .policy-body { width: 100%; height: 300px; border: 1px solid #eee; padding: 20px; font-family: 'Inter'; line-height: 1.6; resize: none; outline: none; }
        
        .btn-submit { background: var(--blue); color: white; border: none; padding: 15px 40px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; float: right; margin-top: 20px; }
        .btn-submit:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="font-family:'Cinzel'; color:var(--gold); margin-bottom:40px; font-size: 1.1rem;">THE COLLECTIVE</div>
        <a href="ypc-main.html">Initiative Home</a>
        <a href="ypc-ambition.html">Ambition Mapping</a>
        <a href="ypc-civic-lab.html">Civic Lab Simulator</a>
        <a href="ypc-gavel-initiative.html" style="color:var(--gold);">Gavel Initiative (Policy)</a>
        <a href="ypc-marketplace.html">Digital Product Vault</a>
    </nav>

    <div class="main-content">
        <div class="header-top">
            <div class="text-logo">YOUNG POLITICIANS COLLECTIVE // THE GAVEL INITIATIVE</div>
        </div>

        <div class="drafting-area">
            <span class="form-label">DRAFTING OFFICER: [YOUNG LEADER NAME]</span>
            <input type="text" class="policy-input" placeholder="Title of Proposed Village Policy">
            
            <span class="form-label">POLICY RATIONALE & ARTICLES</span>
            <textarea class="policy-body" placeholder="Describe the problem, the proposed solution, and the specific articles of this policy..."></textarea>
            
            <button class="btn-submit">SUBMIT TO HIGH COURT</button>
            <div style="clear:both;"></div>
        </div>
    </div>

</body>
</html>
